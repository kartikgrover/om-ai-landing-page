name: Scheduled Blog Publish

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check and publish scheduled posts
        id: publish
        shell: bash
        run: bash .github/scripts/publish-scheduled.sh

      - name: Commit and push changes
        if: steps.publish.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish scheduled blog posts for $(date -u +%Y-%m-%d)"
          git push
